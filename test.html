<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Тест</title>
  <link rel="stylesheet" href="./style.css" />
  <script>
    const params = new URLSearchParams(location.search)
    let id_ = params.get('id')
    let themes = params.get('themes')
    let totalCount = parseInt(params.get('count')) || 10

    // --- seed handling ---
    let seedParam = params.get('seed')
    let seed = seedParam !== null && seedParam !== '' ? parseInt(seedParam) : Math.floor(Math.random() * 1000000)
    if (!Number.isFinite(seed)) seed = Math.floor(Math.random() * 1000000)

    if (seedParam === null || seedParam === '') {
      params.set('seed', seed)
      history.replaceState(null, '', `${location.pathname}?${params.toString()}`)
    }

    let questionsPool = []
    let allQuestions = []
    let baseQuestions = []
    let dataById = new Map()
    let correctAnswer = ''
    let currentQuestion = null
    let wrongQuestions = []
    let correctCount = 0
    let totalAnswered = 0
    let usingWrongPool = false
    let awaitingNext = false   // флаг: ответ уже дан, ждём следующего вопроса

    const STORAGE_KEY = `quizState:${id_}:${seed}`

    // --- seeded RNG (mulberry32) ---
    function mulberry32(a) {
      return function () {
        a |= 0; a = (a + 0x6D2B79F5) | 0
        let t = Math.imul(a ^ (a >>> 15), 1 | a)
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296
      }
    }
    let rand = mulberry32(seed)

    function shuffle(arr) {
      const a = [...arr]
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]]
      }
      return a
    }

    function buildPool(sourceQuestions, count) {
      let pool
      if (count >= 999999) {
        pool = shuffle(sourceQuestions)
      } else {
        const shuffled = shuffle(sourceQuestions)
        if (count <= sourceQuestions.length) {
          pool = shuffled.slice(0, count)
        } else {
          pool = []
          while (pool.length < count) {
            pool.push(...shuffle(sourceQuestions))
          }
          pool = pool.slice(0, count)
        }
      }
      return pool
    }

    function getCorrectAnswer(q) {
      return q.correct || q.answer || q.answers[0]
    }

    function renderAnswers(q) {
      const answersDiv = document.getElementById('answers')
      answersDiv.innerHTML = ''
      const shuffledAnswers = shuffle(q.answers)
      for (let a of shuffledAnswers) {
        const label = document.createElement('label')
        label.setAttribute('data-answer', a)
        label.className = 'answer-btn'
        label.textContent = a
        label.addEventListener('click', () => pickAnswer(a))
        answersDiv.appendChild(label)
      }
    }

    function loadNextFromPool(skipSave) {
      if (questionsPool.length === 0) {
        if (totalCount >= 999999) {
          questionsPool = shuffle(usingWrongPool ? allQuestions : baseQuestions)
        } else {
          document.getElementById('question').textContent = 'Тест завершён'
          document.getElementById('theme').textContent = ''
          document.getElementById('answers').innerHTML = ''
          currentQuestion = null
          updateSeedBadge()
          saveState()
          return
        }
      }

      const q = questionsPool.pop()
      currentQuestion = q
      correctAnswer = getCorrectAnswer(q)
      document.getElementById('theme').textContent = q.type || ''
      document.getElementById('question').textContent = q.question
      renderAnswers(q)

      updateSeedBadge()
      if (!skipSave) saveState()
    }

    function pickAnswer(chosen) {
      const allLabels = document.querySelectorAll('#answers label')
      allLabels.forEach(label => label.classList.add('disabled'))
      allLabels.forEach(label => {
        const val = label.getAttribute('data-answer')
        if (val === correctAnswer) label.classList.add('correct')
        if (val === chosen && val !== correctAnswer) label.classList.add('wrong')
      })
      totalAnswered++
      if (chosen === correctAnswer) {
        correctCount++
      } else {
        if (!wrongQuestions.find(q => q.id === currentQuestion.id)) {
          wrongQuestions.push(currentQuestion)
        }
        updateWrongBtn()
      }
      updateStats()
      awaitingNext = true   // ответ дан — при перезагрузке сразу следующий
      saveState()
      const delay = localStorage.getItem('fastMode') === 'true' ? 700 : 3000
      setTimeout(() => {
        awaitingNext = false
        loadNextFromPool()
      }, delay)
    }

    function animateProgressBarLerp(progressBar, targetRatio, alpha = 0.15) {
      let currentRatio = (progressBar.value || 0) / progressBar.max
      function animate() {
        currentRatio = currentRatio + (targetRatio - currentRatio) * alpha
        progressBar.value = currentRatio * progressBar.max
        if (Math.abs(currentRatio - targetRatio) > 0.005) {
          requestAnimationFrame(animate)
        } else {
          progressBar.value = targetRatio * progressBar.max
        }
      }
      animate()
    }

    function updateWrongBtn() {
      const btn = document.getElementById('wrongBtn')
      if (wrongQuestions.length > 0) {
        btn.textContent = `Повторить проблемные вопросы (${wrongQuestions.length})`
        btn.style.display = 'inline-block'
      } else {
        btn.style.display = 'none'
      }
    }

    function updateStats() {
      const progressBar = document.getElementById('progressBar')
      const pct = totalAnswered === 0 ? 0 : Math.round(correctCount / totalAnswered * 100)
      progressBar.max = 1
      const wrongCount = totalAnswered - correctCount
      if (totalCount >= 999999) {
        animateProgressBarLerp(progressBar, totalAnswered === 0 ? 0 : correctCount / totalAnswered, 0.15)
        document.getElementById('stats').textContent =
          `${totalAnswered} - Правильных ${correctCount}, Неправильных ${wrongCount}, Точность ${pct}%`
      } else {
        animateProgressBarLerp(progressBar, totalAnswered / totalCount, 0.15)
        document.getElementById('stats').textContent =
          `${totalAnswered} / ${totalCount} - Правильных ${correctCount}, Неправильных ${wrongCount}, Точность ${pct}%`
      }
    }

    function updateSeedBadge() {
      const badge = document.getElementById('seedBadge')
      if (!badge) return
      const qId = currentQuestion ? currentQuestion.id : '-'
      badge.textContent = `S${seed}Q${totalAnswered}I${qId}`
    }

    function restartTest() {
      correctCount = 0
      totalAnswered = 0
      wrongQuestions = []
      usingWrongPool = false
      awaitingNext = false
      updateWrongBtn()
      totalCount = parseInt(new URLSearchParams(location.search).get('count')) || 10
      questionsPool = buildPool(baseQuestions, totalCount)
      updateStats()
      loadNextFromPool()
    }

    function restartWrong() {
      if (wrongQuestions.length === 0) return
      correctCount = 0
      totalAnswered = 0
      totalCount = wrongQuestions.length
      allQuestions = [...wrongQuestions]
      usingWrongPool = true
      awaitingNext = false
      wrongQuestions = []
      updateWrongBtn()
      questionsPool = buildPool(allQuestions, totalCount)
      updateStats()
      loadNextFromPool()
    }

    // --- state persistence ---
    function saveState() {
      try {
        const state = {
          seed, totalCount, correctCount, totalAnswered,
          usingWrongPool,
          awaitingNext,   // сохраняем флаг
          questionsPoolIds: questionsPool.map(q => q.id),
          wrongQuestionIds: wrongQuestions.map(q => q.id),
          currentQuestionId: currentQuestion ? currentQuestion.id : null,
          allQuestionIdsSnapshot: usingWrongPool ? allQuestions.map(q => q.id) : null
        }
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state))
      } catch (e) { /* ignore storage errors */ }
    }

    function resolveIds(ids) {
      return (ids || []).map(id => dataById.get(id)).filter(Boolean)
    }

    function restoreState() {
      let raw
      try {
        raw = sessionStorage.getItem(STORAGE_KEY)
      } catch (e) {
        return false
      }
      if (!raw) return false
      let state
      try {
        state = JSON.parse(raw)
      } catch (e) {
        return false
      }
      if (!state) return false

      totalCount = state.totalCount
      correctCount = state.correctCount
      totalAnswered = state.totalAnswered
      usingWrongPool = !!state.usingWrongPool
      awaitingNext = !!state.awaitingNext   // восстанавливаем флаг

      questionsPool = resolveIds(state.questionsPoolIds)
      wrongQuestions = resolveIds(state.wrongQuestionIds)
      currentQuestion = state.currentQuestionId != null ? (dataById.get(state.currentQuestionId) || null) : null
      correctAnswer = currentQuestion ? getCorrectAnswer(currentQuestion) : ''

      if (usingWrongPool && state.allQuestionIdsSnapshot) {
        allQuestions = resolveIds(state.allQuestionIdsSnapshot)
      }

      updateWrongBtn()
      updateStats()

      if (currentQuestion) {
        // Если при сохранении ждали следующего вопроса — сразу его и грузим
        if (awaitingNext) {
          awaitingNext = false
          loadNextFromPool(true)
          return true
        }
        document.getElementById('theme').textContent = currentQuestion.type || ''
        document.getElementById('question').textContent = currentQuestion.question
        renderAnswers(currentQuestion)
      } else {
        document.getElementById('question').textContent = 'Тест завершён'
      }
      updateSeedBadge()
      return true
    }

    function isReload() {
      try {
        const entries = performance.getEntriesByType('navigation')
        if (entries && entries.length > 0) {
          return entries[0].type === 'reload'
        }
      } catch (e) { /* fall through */ }
      if (performance.navigation) {
        return performance.navigation.type === 1
      }
      return false
    }

    window.onload = () => {
      const cb = document.getElementById('fastMode')
      if (cb) cb.checked = localStorage.getItem('fastMode') === 'true'

      fetch('./' + id_ + '.json')
        .then(res => res.json())
        .then(data => {
          data.forEach((q, idx) => { if (q.id === undefined || q.id === null) q.id = idx })
          dataById = new Map(data.map(q => [q.id, q]))

          let filtered = data
          if (themes && themes !== 'all') {
            const selectedThemes = new Set(themes.split(','))
            filtered = data.filter(q => selectedThemes.has(q.type))
          }
          allQuestions = filtered
          baseQuestions = filtered

          if (isReload() && restoreState()) {
            return
          }

          try { sessionStorage.removeItem(STORAGE_KEY) } catch (e) {}
          questionsPool = buildPool(baseQuestions, totalCount)
          updateStats()
          loadNextFromPool()
        })
    }
  </script>
</head>
<body>
  <seed id="seedBadge"></seed>
  <version id="versionBadge">v2b7</version>
  <div class="centered">
    <p id="theme"></p>
    <h1 id="question">Загрузка...</h1>
    <div id="answers"></div>
    <p id="result"></p>
    <p id="stats">Правильных: 0 из 0</p>
    <progress id="progressBar" value="0" max="1"></progress>
    <label style="display:inline-flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;">
      <input type="checkbox" id="fastMode" onchange="localStorage.setItem('fastMode', this.checked)">
      Быстрее показывать новый вопрос
    </label>
    <button id="restartBtn" onclick="restartTest()">Повторить</button>
    <button id="wrongBtn" onclick="restartWrong()" style="display:none">Повторить проблемные вопросы</button>
    <button id="quitBtn" onclick="location.href='./subject.html?id=' + id_">Выйти</button>
  </div>
</body>
</html>
